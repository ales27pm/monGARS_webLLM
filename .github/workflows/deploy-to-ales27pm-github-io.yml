# GitHub Pages publishing for this repo now uses `.github/workflows/static.yml`.
name: (Disabled) Legacy external Pages deployment

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: echo "External deployment is disabled. Use the official GitHub Pages workflow in static.yml."
